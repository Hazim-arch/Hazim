[build]
target = "x86_64-LunerOS.json"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true # This is the fix for the error you just saw

[target.'cfg(all())']
rustflags = [
    "-C", "target-feature=-sse2",
    "-C", "soft-float",
]